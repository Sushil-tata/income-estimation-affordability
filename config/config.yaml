# ============================================================
# Income Estimation & Affordability Framework — Configuration
# CardX / SCB Group | GDZ Environment
# ============================================================

# --- BOT Regulatory Norms ---
bot_norms:
  minimum_income_thb: 15000          # Monthly gross income floor (THB)
  dscr_cap: 0.40                     # Default DSCR cap (fallback when persona unknown)

  # Persona-aware DSCR caps (used by AffordabilityEngine when persona is available)
  # L2 is intentionally higher: its income estimate is already a P30 lower bound,
  # so applying a tight DSCR would double-penalise unstructured income customers.
  dscr_cap_by_persona:
    PAYROLL: 0.40
    L0:      0.40
    L1:      0.38
    L2:      0.45
    THIN:    0.35
    # Legacy segment names (backward compatibility during persona transition)
    SALARY_LIKE:      0.40
    SME:              0.38
    GIG_FREELANCE:    0.45
    PASSIVE_INVESTOR: 0.40

# --- Income Bands (THB/month) ---
income_bands:
  labels:
    - "BAND_1_BELOW_15K"
    - "BAND_2_15K_30K"
    - "BAND_3_30K_50K"
    - "BAND_4_50K_100K"
    - "BAND_5_ABOVE_100K"
  boundaries: [0, 15000, 30000, 50000, 100000, 9999999]

# --- BCI Configuration ---
bci:
  weights:
    income_stability: 0.30
    segment_clarity: 0.20
    data_richness: 0.20
    model_confidence: 0.20
    behavioral_consistency: 0.10
  bands:
    high:
      min: 80
      max: 100
      haircut: 1.00       # Use income at face value
      policy: "STP"
    medium:
      min: 60
      max: 79
      haircut: 0.80       # 80% of estimated income
      policy: "STP"
    low:
      min: 40
      max: 59
      haircut: 0.60       # 60% of estimated income
      policy: "MANUAL_REVIEW"
    very_low:
      min: 0
      max: 39
      haircut: 0.00
      policy: "DECLINE_OR_REFER"
  segment_bci_caps:
    # New persona labels (Phase 2+)
    PAYROLL: 100
    L0:      88
    L1:      75
    L2:      60
    THIN:    30
    # Legacy segment labels (backward compatibility during transition)
    SALARY_LIKE:      90
    SME:              70
    GIG_FREELANCE:    65
    PASSIVE_INVESTOR: 75

# --- Segmentation Thresholds ---
segmentation:
  payroll_min_months: 3                # Min months of payroll credits to qualify
  salary_like_cv_threshold: 0.25       # CV of monthly credits <= this → salary-like
  salary_like_min_months: 6
  thin_min_months_required: 6          # Below this → THIN segment
  thin_min_transactions: 5             # Monthly avg transactions below this → THIN
  sme_business_credit_ratio: 0.40      # Business MCC credit share threshold
  max_credit_lookback_months: 3        # Lookback for max credit feature

# --- Feature Engineering ---
features:
  lookback_months: 12                  # Minimum history window
  monthly_aggregate: true              # Use monthly aggregates only
  min_active_months: 3                 # Min months with any activity

  # Data window tiers — determines confidence level and BCI data_richness cap
  data_tiers:
    tier_12m_min_months: 12            # Full feature set, no cap
    tier_9m_min_months:  9             # Annualised features, cap = 0.75
    tier_6m_min_months:  6             # Limited features, cap = 0.50
    # < 6 months → THIN automatically, policy floor only

# --- Transaction Filter ---
transaction_filter:
  exclude_tagged: true                 # Apply column-based exclusions (Mode A)
  apply_heuristics: true               # Apply chit fund heuristic (Mode B)
  spike_review_threshold: 5.0          # Credits > N× median flagged for review
  chit_fund_min_multiple: 8.0          # Credits >= N× median excluded as chit fund
  chit_fund_min_history_months: 6      # Min history before chit fund detection

# --- Model Parameters ---
models:
  income_band_classifier:
    type: "lightgbm"
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    num_leaves: 31
    min_child_samples: 50
    subsample: 0.8
    colsample_bytree: 0.8
    class_weight: "balanced"
    random_state: 42
    n_jobs: -1
  income_regression:
    type: "quantile_lgbm"
    quantiles: [0.25, 0.50, 0.75]      # Lower, median, upper estimates
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 5
    num_leaves: 31
    min_child_samples: 50
    random_state: 42
    n_jobs: -1

# --- Observation Window ---
observation:
  dev_start: "2024-01-01"
  dev_end: "2024-07-01"
  min_history_months: 12

# --- Advanced Modeling (SegmentModelTrainer) ---
advanced_modeling:
  # LightGBM loss functions to evaluate per segment
  lgb_losses:
    - "huber_10k"
    - "huber_20k"
    - "quantile_p30"
    - "quantile_p40"
    - "quantile_p50"
    - "log_rmse"
    - "mape"
    - "tweedie_p15"

  # Label strategies to evaluate per segment
  label_strategies:
    - "raw"
    - "robust"
    - "quantile"
    - "shrunk_composite"

  # Deep learning flags (set false if libraries unavailable in GDZ)
  include_lstm: true
  include_tabpfn: true
  include_autogluon: false          # Heavy install ~2GB — check GDZ policy

  # LSTM model config
  lstm:
    hidden_size: 64
    n_layers: 2
    dropout: 0.20
    lr: 0.001
    n_epochs: 50
    batch_size: 256
    patience: 7
    n_months: 12

  # TabPFN v2 config
  tabpfn:
    max_train_rows: 10000           # Rows above this are sampled
    n_estimators: 8
    log_target: true

  # AutoGluon config (if enabled)
  autogluon:
    time_limit: 300                 # Seconds — cap for GDZ compute
    presets: "medium_quality"
    excluded_model_types: ["NN_TORCH", "FASTAI"]

  # Segment trainer search config
  segment_trainer:
    cv_folds: 5
    max_rows_per_segment: 20000
    random_state: 42

  # Mixture-of-Experts blending
  # When the router's top-class probability is below this threshold, blend
  # the top-2 persona models weighted by their probabilities.
  moe_confidence_threshold: 0.70

  # Persona stability smoothing (stateless exponential smoothing)
  # smoothed_probs = alpha * new_probs + (1 - alpha) * prev_probs
  # Switch persona only if: P(new) - P(current) > stability_switch_delta
  # for the smoothed probability vector.
  persona_stability:
    smoothing_alpha: 0.50
    switch_delta: 0.15            # Min probability margin to accept a switch
    target_switch_rate: 0.05      # Target: < 5% of customers switch persona monthly

# --- Feature Selection ---
feature_selection:
  variance_threshold: 0.01          # Drop features with variance < this
  correlation_threshold: 0.92       # Drop redundant correlated features
  top_k: 0.60                       # Supervised methods target top 60% of features
  min_votes: 2                      # Consensus: feature must be picked by >= 2/3 methods
  run_boruta: true                  # Disable for faster iteration
  run_stability: false              # Enable for vintage-level stability check
  n_bootstrap: 20                   # Bootstrap runs for stability
  min_stability: 0.60               # Min fraction of runs feature must be selected

# --- Label Engineering ---
label_engineering:
  shrinkage_alpha: 1.0              # Ridge alpha for composite label OLS
  winsor_pct: 0.025                 # Winsorization at 2.5% tails
  segment_quantile_targets:         # Quantile target per segment for QUANTILE strategy
    PAYROLL: 0.50
    SALARY_LIKE: 0.40
    SME: 0.30
    GIG_FREELANCE: 0.25
    PASSIVE_INVESTOR: 0.40
    THIN: 0.35

# --- Data Paths (relative to project root, actual data stays in GDZ) ---
paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  sample_data: "data/sample/"
  model_artifacts: "artifacts/models/"
  reports: "artifacts/reports/"
